<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員登録 - アイサット</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="/" class="logo-link">
                    <h1>アイサット</h1>
                </a>
            </div>
        </div>
    </header>
    
    <main>
        <div class="container">
            <div class="auth-container">
                <div class="auth-box">
                    <h2>会員登録</h2>
                    
                    <div class="error-message" th:if="${error}" th:text="${error}"></div>
                    
                    <form th:action="@{/register}" method="post" class="auth-form">
                        <div class="form-group">
                            <label for="username">ユーザー名 *</label>
                            <input type="text" id="username" name="username" 
                                   th:value="${registerRequest.username}" 
                                   placeholder="3〜50文字で入力してください" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">メールアドレス *</label>
                            <input type="email" id="email" name="email" 
                                   th:value="${registerRequest.email}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">パスワード *</label>
                            <input type="password" id="password" name="password" 
								  th:value="${registerRequest.password}" 
                                   placeholder="6文字以上で入力してください" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="realName">本名 *</label>
                            <input type="text" id="realName" name="realName" 
                                   th:value="${registerRequest.realName}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">電話番号</label>
                            <input type="tel" id="phone" name="phone" 
                                   th:value="${registerRequest.phone}"
                                   placeholder="例: 09012345678">
                        </div>
                        
                        <div class="form-group">
                            <button type="submit" class="btn-primary btn-block">会員登録</button>
                        </div>
                    </form>
                    
                    <div class="auth-footer">
                        <p>既にアカウントをお持ちですか？ 
                           <a th:href="@{/login}" class="link">ログイン</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 アイサット. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
